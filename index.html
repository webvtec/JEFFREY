<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>LXL Home Improvement LLC – House Remodeling Experts NYC</title>
<meta name="description" content="LXL Home Improvement LLC – Licensed Home Improvement Contractor serving the Bronx, Queens, Brooklyn, Manhattan, and Staten Island.">
<meta name="keywords" content="LXL Home Improvement, home remodeling NYC, house renovation Bronx, kitchen remodeling Queens, bathroom remodeling Brooklyn, flooring NYC, painting contractor Manhattan, carpentry Staten Island, licensed contractor NYC, tiling, masonry, window replacement">
<meta name="author" content="LXL Home Improvement LLC">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg:          #0D0F14;
  --surface:     #13161D;
  --surface2:    #1A1E28;
  --surface3:    #212634;
  --neon:        #00C9A7;
  --neon-dim:    rgba(0,201,167,0.08);
  --neon-glow:   rgba(0,201,167,0.2);
  --hot:         #FF6B35;
  --hot-dim:     rgba(255,107,53,0.1);
  --amber:       #F5A623;
  --text:        #E8EBF0;
  --text-dim:    #6B7485;
  --text-mid:    #9AA3B2;
  --border:      rgba(255,255,255,0.06);
  --border-lit:  rgba(0,201,167,0.2);
  --green:       #22C55E;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
}

body {
  background: var(--bg);
  padding-bottom: 36px;
  min-height: 100vh;
}

/* ========================= HEADER ========================= */
.header-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 52px;
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  border-bottom: 1px solid var(--border);
}
.header-bar::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--neon), var(--hot), var(--neon), transparent);
  background-size: 300% 100%;
  animation: stripeFlow 5s linear infinite;
}
@keyframes stripeFlow {
  0%   { background-position: 200% center; }
  100% { background-position: -100% center; }
}

.header-title {
  font-family: 'Outfit', sans-serif;
  font-weight: 800;
  font-size: 13px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #fff;
  text-align: center;
  padding: 0 50px;
}
.header-title .brand-teal { color: var(--neon); }

.header-icons {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  align-items: center;
  gap: 6px;
}
.header-icon-btn {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 6px;
  height: 32px;
  width: 32px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  color: var(--text-mid);
  transition: all 0.2s ease;
  cursor: pointer;
  flex-shrink: 0;
  font-size: 15px;
}
.header-icon-btn:hover {
  background: rgba(0,201,167,0.1);
  border-color: var(--border-lit);
  color: var(--neon);
}

/* Hamburger */
.hamburger-btn {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  background: transparent;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 6px;
  height: 32px;
  width: 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  cursor: pointer;
  z-index: 1001;
  transition: all 0.2s ease;
}
.hamburger-btn span {
  display: block;
  width: 16px;
  height: 1.5px;
  background: var(--text-mid);
  border-radius: 2px;
  transition: all 0.3s ease;
}
.hamburger-btn.open span:nth-child(1) { transform: translateY(5.5px) rotate(45deg); }
.hamburger-btn.open span:nth-child(2) { opacity: 0; }
.hamburger-btn.open span:nth-child(3) { transform: translateY(-5.5px) rotate(-45deg); }
.hamburger-btn:hover { border-color: var(--border-lit); background: rgba(0,201,167,0.06); }

/* ========================= SIDEBAR ========================= */
.sidebar-scrim {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 998;
  backdrop-filter: blur(4px);
}
.sidebar-scrim.show { display: block; }
.sidebar-panel {
  position: fixed;
  top: 52px; left: 0; bottom: 0;
  width: 220px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  z-index: 999;
  transform: translateX(-100%);
  transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
  overflow-y: auto;
  padding: 12px 0 40px;
  display: flex;
  flex-direction: column;
}
.sidebar-panel.open { transform: translateX(0); }
.sidebar-panel::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--neon), var(--hot));
}
.sidebar-nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 18px;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  font-weight: 600;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-dim);
  border: none;
  background: transparent;
  width: 100%;
  text-align: left;
  transition: all 0.18s ease;
  position: relative;
}
.sidebar-nav-item:hover { color: var(--text-mid); background: rgba(255,255,255,0.03); }
.sidebar-nav-item.active { color: var(--neon); background: var(--neon-dim); }
.sidebar-nav-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 20%; bottom: 20%;
  width: 2px;
  background: var(--neon);
  border-radius: 0 2px 2px 0;
}
.snav-icon { font-size: 15px; flex-shrink: 0; }
.sidebar-divider {
  height: 1px;
  background: var(--border);
  margin: 6px 14px;
}
.sidebar-label {
  font-family: 'Outfit', sans-serif;
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--hot);
  text-transform: uppercase;
  padding: 8px 18px 4px;
  opacity: 0.7;
}
.sidebar-phone-block {
  padding: 12px 18px;
}
.sidebar-phone-block .spb-label {
  font-family: 'Outfit', sans-serif;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-bottom: 6px;
}
.sidebar-phone-block a {
  display: block;
  font-family: 'IBM Plex Mono', monospace;
  font-weight: 600;
  font-size: 16px;
  color: var(--neon);
  text-decoration: none;
  letter-spacing: 1px;
}
.sidebar-phone-block .spb-days {
  font-family: 'Outfit', sans-serif;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-top: 4px;
}

/* ========================= CONTENT ========================= */
.content-section {
  display: none;
  padding-top: 52px;
  min-height: calc(100vh - 52px);
  position: relative;
  z-index: 1;
}
.content-section.active { display: block; }

/* ========================= HERO ========================= */
.hero-section {
  text-align: center;
  padding: 36px 20px 28px;
}
.hero-kicker {
  font-family: 'Outfit', sans-serif;
  font-weight: 600;
  font-size: 10px;
  letter-spacing: 5px;
  color: var(--hot);
  text-transform: uppercase;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.hero-kicker::before, .hero-kicker::after {
  content: ''; width: 20px; height: 1px;
  background: var(--hot); opacity: 0.4;
}
.hero-title {
  font-family: 'Outfit', sans-serif;
  font-weight: 900;
  font-size: clamp(36px, 11vw, 64px);
  line-height: 1;
  text-transform: uppercase;
  color: var(--text);
  margin: 0 0 10px;
  letter-spacing: -1px;
}
.hero-title .accent { color: var(--neon); }
.hero-sub {
  font-family: 'Outfit', sans-serif;
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 14px;
}
.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: rgba(34,197,94,0.08);
  border: 1px solid rgba(34,197,94,0.2);
  border-radius: 20px;
  padding: 6px 14px;
  font-family: 'Outfit', sans-serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2px;
  color: var(--green);
  text-transform: uppercase;
  margin-bottom: 24px;
}
.hero-badge .dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--green);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.7); }
}
.hero-cta-row {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 28px;
}

/* ========================= BUTTONS ========================= */
.cta-btn {
  display: inline-block;
  padding: 11px 24px;
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 10px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  text-decoration: none;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.18s ease;
  border: none;
}
.cta-btn--primary {
  background: var(--neon);
  color: #000;
}
.cta-btn--primary:hover { background: #00E5BF; transform: translateY(-1px); }
.cta-btn--outline {
  background: transparent;
  color: var(--text-mid);
  border: 1px solid rgba(255,255,255,0.12) !important;
}
.cta-btn--outline:hover {
  border-color: var(--border-lit) !important;
  color: var(--neon);
  transform: translateY(-1px);
}

/* ========================= SECTION KICKER ========================= */
.section-kicker {
  text-align: center;
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 9px;
  color: var(--hot);
  letter-spacing: 5px;
  text-transform: uppercase;
  margin-top: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.section-kicker::before, .section-kicker::after {
  content: '';
  width: 22px; height: 1px;
  background: var(--hot); opacity: 0.4;
}

h1 {
  font-family: 'Outfit', sans-serif;
  font-weight: 900;
  font-size: clamp(28px, 8vw, 44px);
  letter-spacing: -0.5px;
  text-transform: uppercase;
  color: var(--text);
  text-align: center;
  margin: 8px 0 6px;
  line-height: 1;
}
h1 span.accent { color: var(--neon); }

/* ========================= DIVIDER ========================= */
.section-divider {
  height: 1px;
  background: var(--border);
  margin: 0 18px 24px;
}

/* ========================= SERVICES ========================= */
.services-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-top: 20px;
}
@media (min-width: 600px) { .services-grid { grid-template-columns: repeat(3, 1fr); } }
@media (min-width: 900px) { .services-grid { grid-template-columns: repeat(4, 1fr); } }

.service-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 18px 14px;
  text-align: center;
  transition: all 0.2s ease;
  cursor: default;
  position: relative;
  overflow: hidden;
}
.service-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--neon), var(--hot));
  transform: scaleX(0);
  transition: transform 0.2s ease;
  transform-origin: left;
}
.service-card:hover {
  border-color: rgba(0,201,167,0.2);
  transform: translateY(-2px);
}
.service-card:hover::before { transform: scaleX(1); }
.service-card .svc-icon { font-size: 26px; margin-bottom: 8px; display: block; }
.service-card .svc-name {
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--text);
}
.service-card .svc-desc {
  font-family: 'Outfit', sans-serif;
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 5px;
  line-height: 1.4;
}

/* ========================= GALLERY ========================= */
.gallery-hero {
  text-align: center;
  padding: 32px 20px 20px;
}
.gallery-category { margin-top: 24px; }
.gallery-category h3 {
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 10px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--text-mid);
  padding: 0 18px;
  margin: 0 0 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.gallery-category h3::before {
  content: '';
  width: 3px; height: 14px;
  background: var(--neon);
  border-radius: 2px;
  flex-shrink: 0;
}
.ba-grid {
  display: flex;
  overflow-x: auto;
  gap: 10px;
  padding: 0 18px 14px;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
  scrollbar-color: var(--surface3) transparent;
}
.ba-grid::-webkit-scrollbar { height: 2px; }
.ba-grid::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }
.ba-card {
  flex-shrink: 0;
  width: 190px;
  scroll-snap-align: start;
  border-radius: 7px;
  overflow: hidden;
  border: 1px solid var(--border);
  background: var(--surface);
  transition: transform 0.2s ease, border-color 0.2s ease;
}
.ba-card:hover { transform: translateY(-3px); border-color: var(--border-lit); }
.ba-card-img { width: 100%; height: 160px; object-fit: cover; display: block; }
.ba-card-placeholder {
  width: 100%;
  height: 160px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  background: var(--surface2);
  color: var(--text-dim);
}
.ba-card-placeholder span {
  font-family: 'Outfit', sans-serif;
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-top: 6px;
}
.ba-card-label {
  padding: 7px 10px;
  font-family: 'Outfit', sans-serif;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.ba-label-before { color: var(--text-dim); }
.ba-label-after { color: var(--neon); }
.ba-label-arrow { color: var(--hot); font-size: 12px; }

/* ========================= ESTIMATE FORM ========================= */
.estimate-section { padding: 0 18px 36px; }
.estimate-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 24px 20px;
  position: relative;
  overflow: hidden;
  margin-top: 18px;
}
.estimate-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--neon), var(--hot));
}
.form-group { margin-bottom: 14px; }
.form-label {
  display: block;
  font-family: 'Outfit', sans-serif;
  font-weight: 600;
  font-size: 9px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 5px;
}
.form-input, .form-select, .form-textarea {
  width: 100%;
  padding: 10px 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 5px;
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  transition: border-color 0.2s ease;
  outline: none;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--neon);
  box-shadow: 0 0 0 3px rgba(0,201,167,0.08);
}
.form-select option { background: var(--surface2); }
.form-textarea { resize: vertical; min-height: 90px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
@media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }
.submit-btn {
  width: 100%;
  padding: 13px;
  background: var(--neon);
  color: #000;
  border: none;
  border-radius: 5px;
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.18s ease;
  margin-top: 6px;
}
.submit-btn:hover { background: #00E5BF; transform: translateY(-1px); }

/* ========================= INFO SECTION ========================= */
.info-section { padding: 0 18px 36px; }
.info-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
  margin-top: 18px;
}
@media (min-width: 600px) { .info-grid { grid-template-columns: 1fr 1fr; } }
.info-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 18px 16px;
  transition: border-color 0.2s ease;
}
.info-card:hover { border-color: var(--border-lit); }
.info-card-title {
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--hot);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 7px;
}
.ic-icon { font-size: 14px; }
.info-item {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  color: var(--text);
}
.ii-icon { font-size: 14px; flex-shrink: 0; color: var(--neon); }
.info-item a { color: var(--neon); text-decoration: none; }
.info-item a:hover { text-decoration: underline; }
.payment-row { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 6px; }
.payment-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 12px;
  font-family: 'Outfit', sans-serif;
  font-weight: 600;
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-mid);
}
.location-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 7px;
  margin-top: 7px;
}
.location-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  background: rgba(255,107,53,0.06);
  border: 1px solid rgba(255,107,53,0.15);
  border-radius: 5px;
  padding: 7px 10px;
  font-family: 'Outfit', sans-serif;
  font-weight: 600;
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--hot);
}

/* ========================= REVIEWS ========================= */
.reviews-section { padding: 0 18px 36px; }
.reviews-strip {
  display: flex;
  overflow-x: auto;
  gap: 12px;
  padding: 18px 0 14px;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
  scrollbar-color: var(--surface3) transparent;
}
.reviews-strip::-webkit-scrollbar { height: 2px; }
.review-card {
  flex-shrink: 0;
  width: 250px;
  scroll-snap-align: start;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px 14px;
  transition: border-color 0.2s ease;
  position: relative;
}
.review-card:hover { border-color: var(--border-lit); }
.review-card::before {
  content: '"';
  position: absolute;
  top: 6px; right: 12px;
  font-family: 'Outfit', sans-serif;
  font-size: 44px;
  color: rgba(0,201,167,0.1);
  line-height: 1;
}
.review-stars { font-size: 11px; margin-bottom: 7px; letter-spacing: 2px; color: var(--amber); }
.review-text {
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  color: var(--text-mid);
  line-height: 1.55;
  margin-bottom: 12px;
}
.review-author {
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--neon);
}
.review-location {
  font-family: 'Outfit', sans-serif;
  font-size: 10px;
  color: var(--text-dim);
  margin-top: 2px;
}

/* ========================= ABOUT ========================= */
.about-section { padding: 0 18px 36px; }
.about-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 24px 20px;
  margin-top: 18px;
  position: relative;
  overflow: hidden;
}
.about-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--neon), var(--hot));
}
.about-text {
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  color: var(--text-mid);

  <!-- Firebase Storage: load gallery photos -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getStorage, ref, listAll, getDownloadURL, getMetadata }
      from "https://www.gstatic.com/firebasejs/11.0.0/firebase-storage.js";

    const app = initializeApp({
      apiKey:            "AIzaSyDZsl7wCM4ABai7-YMg_6PzPUOsq2M9CKM",
      authDomain:        "lxl-home-improvement-llc.firebaseapp.com",
      projectId:         "lxl-home-improvement-llc",
      storageBucket:     "lxl-home-improvement-llc.firebasestorage.app",
      messagingSenderId: "690054839471",
      appId:             "1:690054839471:web:59a803e363766c75e6e85a"
    });
    const storage = getStorage(app);

    const CATEGORIES = [
      "Kitchen Refurbishment",
      "Bathroom Refurbishment",
      "Flooring & Tiling",
      "Painting & Carpentry",
      "Masonry",
      "Window Replacement",
      "General"
    ];

    async function loadGallery() {
      const container = document.getElementById("firebaseGalleryContainer");
      if (!container) return;
      try {
        const result = await listAll(ref(storage, "gallery/"));
        if (!result.items.length) {
          container.innerHTML = "<p style='text-align:center;color:var(--text-dim);font-size:12px;letter-spacing:2px;text-transform:uppercase;padding:32px;'>Photos coming soon</p>";
          return;
        }
        // Fetch all metadata + URLs in parallel
        const photos = await Promise.all(result.items.map(async item => {
          const [url, m] = await Promise.all([getDownloadURL(item), getMetadata(item)]);
          return {
            url,
            category: (m.customMetadata && m.customMetadata.category) || "General",
            isBefore: m.customMetadata && m.customMetadata.isBefore === "true"
          };
        }));

        // Group by category, preserving order
        const groups = {};
        for (const cat of CATEGORIES) groups[cat] = [];
        for (const p of photos) {
          if (!groups[p.category]) groups[p.category] = [];
          groups[p.category].push(p);
        }

        container.innerHTML = "";
        for (const [cat, items] of Object.entries(groups)) {
          if (!items.length) continue;
          const section = document.createElement("div");
          section.className = "gallery-category";
          section.innerHTML = "<h3>" + cat + "</h3>";
          const grid = document.createElement("div");
          grid.className = "ba-grid";
          for (const photo of items) {
            const card = document.createElement("div");
            card.className = "ba-card";
            card.style.cursor = "pointer";
            card.onclick = () => openPhotoModal(photo.url);
            card.innerHTML =
              "<img class='ba-card-img' src='" + photo.url + "' alt='" + cat + "' loading='lazy'>" +
              "<div class='ba-card-label'>" +
                (photo.isBefore
                  ? "<span class='ba-label-before'>BEFORE</span><span class='ba-label-arrow'>→</span>"
                  : "<span class='ba-label-after'>AFTER</span>") +
              "</div>";
            grid.appendChild(card);
          }
          section.appendChild(grid);
          container.appendChild(section);
        }
      } catch(e) {
        console.error(e);
        container.innerHTML = "<p style='text-align:center;color:var(--text-dim);padding:32px;font-size:12px;'>⚠️ Could not load gallery.</p>";
      }
    }

    document.addEventListener("DOMContentLoaded", loadGallery);
  <\/script>
</head>

  </div>
</div>

<!-- ========================= TOAST ========================= -->
<div class="toast" id="toast">Message sent!</div>

<!-- ========================= PHOTO MODAL ========================= -->
<div class="photo-modal-overlay" id="photoModal" onclick="closePhotoModal()">
  <div class="photo-modal-inner">
    <button class="photo-modal-close" onclick="closePhotoModal()">✕</button>
    <img id="photoModalImg" src="" alt="Project photo">
  </div>
</div>

<!-- ========================= FOOTER ========================= -->
<div class="site-footer">LXL Home Improvement LLC — NYC's Trusted Remodelers · 7 Days a Week</div>

<script>
function showSection(sectionId) {
  document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
  const target = document.getElementById(sectionId);
  if (target) { target.classList.add('active'); window.scrollTo(0,0); }
  document.querySelectorAll('.sidebar-nav-item').forEach(el => el.classList.remove('active'));
  const map = {
    'homeSection':'snav-home','gallerySection':'snav-gallery','servicesSection':'snav-services',
    'estimateSection':'snav-estimate','aboutSection':'snav-about','reviewsSection':'snav-reviews','contactSection':'snav-contact'
  };
  const navId = map[sectionId];
  if (navId) { const el = document.getElementById(navId); if (el) el.classList.add('active'); }
}

function toggleSidebar() {
  const panel = document.getElementById('sidebarPanel');
  const scrim = document.getElementById('sidebarScrim');
  const btn = document.getElementById('hamburgerBtn');
  if (panel.classList.contains('open')) { closeSidebar(); }
  else { panel.classList.add('open'); scrim.classList.add('show'); btn.classList.add('open'); }
}
function closeSidebar() {
  document.getElementById('sidebarPanel').classList.remove('open');
  document.getElementById('sidebarScrim').classList.remove('show');
  document.getElementById('hamburgerBtn').classList.remove('open');
}

function submitEstimate() {
  const first = document.getElementById('firstName').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const service = document.getElementById('service').value;
  if (!first || !phone || !service) { showToast('Please fill in name, phone, and service.', false); return; }
  const msg = encodeURIComponent(
    `NEW ESTIMATE REQUEST\nName: ${first} ${document.getElementById('lastName').value}\nPhone: ${phone}\nEmail: ${document.getElementById('email').value}\nBorough: ${document.getElementById('borough').value}\nService: ${service}\nDescription: ${document.getElementById('description').value}`
  );
  window.open(`https://wa.me/19295551234?text=${msg}`, '_blank');
  ['firstName','lastName','phone','email','description'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('borough').value = '';
  document.getElementById('service').value = '';
  showToast("Estimate request sent! We'll be in touch soon.", true);
}

document.addEventListener('DOMContentLoaded', function() {
  const phoneInput = document.getElementById('phone');
  if (phoneInput) {
    phoneInput.addEventListener('input', function(e) {
      let input = e.target.value.replace(/\D/g, '');
      if (input.length > 10) input = input.substring(0, 10);
      let formatted = input;
      if (input.length > 6) formatted = `(${input.substring(0,3)}) ${input.substring(3,6)}-${input.substring(6)}`;
      else if (input.length > 3) formatted = `(${input.substring(0,3)}) ${input.substring(3)}`;
      else if (input.length > 0) formatted = `(${input}`;
      e.target.value = formatted;
    });
  }
});

function openPhotoModal(src) {
  document.getElementById('photoModalImg').src = src;
  document.getElementById('photoModal').classList.add('show');
}
function closePhotoModal() {
  document.getElementById('photoModal').classList.remove('show');
}

function showToast(message, success = true) {
  const toast = document.getElementById('toast');
  toast.innerText = message;
  toast.style.backgroundColor = success ? 'var(--neon)' : 'var(--hot)';
  toast.style.color = success ? '#000' : '#fff';
  toast.style.visibility = 'visible';
  toast.style.opacity = '1';
  toast.style.bottom = '40px';
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.bottom = '20px';
    setTimeout(() => { toast.style.visibility = 'hidden'; }, 400);
  }, 2800);
}
</script>
</body>
</html>
