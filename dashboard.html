<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LXL Home Improvement — Admin Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:         #0D0F14;
      --surface:    #13161D;
      --surface2:   #1A1E28;
      --surface3:   #212634;
      --neon:       #00C9A7;
      --neon-dim:   rgba(0,201,167,0.1);
      --hot:        #FF6B35;
      --hot-dim:    rgba(255,107,53,0.1);
      --text:       #E8EBF0;
      --text-dim:   #6B7485;
      --text-mid:   #9AA3B2;
      --border:     rgba(255,255,255,0.06);
      --border-lit: rgba(0,201,167,0.25);
      --green:      #22C55E;
      --red:        #EF4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      font-size: 14px;
    }

    /* ======= HEADER ======= */
    .header-bar {
      background: var(--surface);
      padding: 0 16px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 5px;
      color: #fff;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-bar::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--neon), var(--hot), var(--neon), transparent);
      background-size: 300% 100%;
      animation: stripeFlow 5s linear infinite;
    }
    @keyframes stripeFlow {
      0%   { background-position: 200% center; }
      100% { background-position: -100% center; }
    }
    .brand-teal { color: var(--neon); }
    .brand-admin { font-size: 9px; letter-spacing: 4px; font-weight: 500; opacity: 0.45; margin-left: 10px; }

    /* ======= TOP NAV ======= */
    .top-menu {
      display: flex;
      gap: 4px;
      background: var(--surface);
      padding: 8px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 52px;
      z-index: 90;
    }
    .top-menu button {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid transparent;
      padding: 7px 6px;
      border-radius: 5px;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: clamp(9px, 2.8vw, 11px);
      letter-spacing: 1px;
      text-transform: uppercase;
      flex: 1;
      transition: all 0.18s ease;
    }
    .top-menu button:hover { color: var(--text-mid); background: rgba(255,255,255,0.04); }
    .top-menu button.active { background: var(--neon-dim); color: var(--neon); border-color: var(--border-lit); }

    /* ======= CONTENT ======= */
    .page-section { display: none; padding: 14px; }
    .page-section.active { display: block; }

    /* ======= STAT CARDS ======= */
    .stat-row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }
    @media (min-width: 600px) { .stat-row { grid-template-columns: repeat(4, 1fr); } }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 10px;
      text-align: center;
    }
    .stat-card .stat-num {
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 600;
      font-size: 26px;
      color: var(--neon);
    }
    .stat-card .stat-lbl {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-top: 3px;
    }

    /* ======= SECTION TITLE ======= */
    .section-title {
      font-weight: 700;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title::before {
      content: '';
      width: 3px; height: 14px;
      background: var(--neon);
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ======= ESTIMATE CARDS ======= */
    .estimate-card-admin {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 8px;
      transition: border-color 0.2s ease;
    }
    .estimate-card-admin:hover { border-color: rgba(0,201,167,0.2); }
    .ec-name { font-weight: 700; font-size: 14px; color: var(--text); margin-bottom: 4px; }
    .ec-detail { font-size: 12px; color: var(--text-dim); margin-bottom: 2px; }
    .ec-status {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: 8px;
    }
    .ec-status.new       { background: var(--neon-dim); color: var(--neon); border: 1px solid rgba(0,201,167,0.2); }
    .ec-status.in-progress { background: var(--hot-dim); color: var(--hot); border: 1px solid rgba(255,107,53,0.2); }
    .ec-status.completed { background: rgba(34,197,94,0.1); color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
    .ec-status.cancelled { background: rgba(239,68,68,0.1); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }

    .ec-actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
    .ec-btn {
      padding: 5px 12px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.15s ease;
    }
    .ec-btn.primary { background: rgba(0,201,167,0.15); color: var(--neon); border: 1px solid rgba(0,201,167,0.3); }
    .ec-btn.primary:hover { background: rgba(0,201,167,0.25); }
    .ec-btn.success { background: rgba(34,197,94,0.12); color: var(--green); border: 1px solid rgba(34,197,94,0.25); }
    .ec-btn.success:hover { background: rgba(34,197,94,0.22); }
    .ec-btn.danger  { background: rgba(239,68,68,0.12); color: var(--red); border: 1px solid rgba(239,68,68,0.25); }
    .ec-btn.danger:hover  { background: rgba(239,68,68,0.22); }

    /* ======= EMPTY STATE ======= */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-dim);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .empty-state .es-icon { font-size: 32px; margin-bottom: 10px; opacity: 0.3; }

    /* ======= FILTER BAR ======= */
    .filter-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .filter-btn:hover { border-color: var(--border-lit); color: var(--text-mid); }
    .filter-btn.active { background: var(--neon-dim); color: var(--neon); border-color: var(--border-lit); }

    /* ======= GALLERY ======= */
    .gallery-admin-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-top: 10px;
    }
    @media (min-width: 600px) { .gallery-admin-grid { grid-template-columns: repeat(3, 1fr); } }
    .gallery-thumb {
      position: relative;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid var(--border);
      aspect-ratio: 4/3;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .gallery-thumb:hover { border-color: var(--border-lit); }
    .gallery-thumb .gt-label {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.75);
      padding: 3px 7px;
      font-size: 8px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #fff;
    }
    .gallery-thumb .gt-del {
      position: absolute;
      top: 4px; right: 4px;
      background: rgba(239,68,68,0.85);
      color: #fff;
      border: none;
      border-radius: 4px;
      width: 20px; height: 20px;
      font-size: 11px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .gallery-thumb:hover .gt-del { display: flex; }

    .upload-zone-admin {
      border: 1px dashed rgba(0,201,167,0.25);
      border-radius: 7px;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      background: rgba(0,201,167,0.02);
      margin-bottom: 14px;
    }
    .upload-zone-admin:hover { border-color: rgba(0,201,167,0.5); background: rgba(0,201,167,0.06); }
    .upload-zone-admin p { font-size: 10px; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; margin-top: 5px; }
    #adminPhotoInput { display: none; }

    .form-group { margin-bottom: 12px; }
    .form-label { display: block; font-weight: 600; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 5px; }
    .form-select {
      width: 100%;
      padding: 9px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      outline: none;
    }
    .form-select option { background: var(--surface2); }
    .form-select:focus { border-color: var(--neon); }

    /* ======= TOAST ======= */
    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--neon);
      color: #000;
      padding: 9px 20px;
      border-radius: 6px;
      font-weight: 700;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      z-index: 9999;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.3s, bottom 0.3s;
      white-space: nowrap;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header-bar">
  <span class="brand-teal">LXL</span>&nbsp;HOME IMPROVEMENT
  <span class="brand-admin">ADMIN</span>
</div>

<!-- NAV -->
<div class="top-menu">
  <button class="active" id="tab-estimates" onclick="showPage('estimatesPage', this)">Estimates</button>
  <button id="tab-gallery" onclick="showPage('galleryPage', this)">Gallery</button>
</div>

<div id="dashboardContent">

  <!-- ======= ESTIMATES PAGE ======= -->
  <div class="page-section active" id="estimatesPage">

    <!-- Stats -->
    <div class="stat-row" style="margin-top:14px;">
      <div class="stat-card">
        <div class="stat-num" id="statTotal">0</div>
        <div class="stat-lbl">Total</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statNew" style="color:var(--neon);">0</div>
        <div class="stat-lbl">New</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statProgress" style="color:var(--hot);">0</div>
        <div class="stat-lbl">In Progress</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statDone" style="color:var(--green);">0</div>
        <div class="stat-lbl">Completed</div>
      </div>
    </div>

    <!-- Filter -->
    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('New', this)">New</button>
      <button class="filter-btn" onclick="setFilter('In Progress', this)">In Progress</button>
      <button class="filter-btn" onclick="setFilter('Completed', this)">Completed</button>
    </div>

    <!-- List -->
    <div class="section-title">Incoming Requests</div>
    <div id="estimatesList"></div>
  </div>

  <!-- ======= GALLERY PAGE ======= -->
  <div class="page-section" id="galleryPage">
    <div class="section-title" style="margin-top:14px;">Before &amp; After Gallery</div>

    <div class="upload-zone-admin" onclick="document.getElementById('adminPhotoInput').click()">
      <div style="font-size:24px; margin-bottom:4px; color:var(--neon);">↑</div>
      <p>Upload Before / After Photos</p>
      <p style="font-size:9px; opacity:0.5; margin-top:2px;">JPG, PNG supported</p>
    </div>
    <input type="file" id="adminPhotoInput" multiple accept="image/*" onchange="handleAdminUpload(event)">

    <div class="form-group" style="margin-bottom:12px;">
      <label class="form-label">Photo Category</label>
      <select class="form-select" id="photoCategory">
        <option>Kitchen Refurbishment</option>
        <option>Bathroom Refurbishment</option>
        <option>Flooring &amp; Tiling</option>
        <option>Painting &amp; Carpentry</option>
        <option>Masonry</option>
        <option>Window Replacement</option>
        <option>General</option>
      </select>
    </div>
    <div style="margin-bottom:12px;">
      <label style="display:flex; align-items:center; gap:8px; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-dim); cursor:pointer;">
        <input type="checkbox" id="isBeforePhoto" style="accent-color:var(--neon); width:14px; height:14px;"> Mark as BEFORE photo
      </label>
    </div>

    <div class="gallery-admin-grid" id="adminGalleryGrid">
      <div class="empty-state" style="grid-column:1/-1;">
        <div class="es-icon">📷</div>
        No photos yet — upload above
      </div>
    </div>
  </div>

</div>

<div id="toast">Saved!</div>

<script>
// ======= NAV =======
function showPage(pageId, btn) {
  document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.top-menu button').forEach(b => b.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
  if (btn) btn.classList.add('active');
}

// ======= DATA =======
let estimates = JSON.parse(localStorage.getItem('lxl_estimates') || '[]');
let galleryPhotos = JSON.parse(localStorage.getItem('lxl_gallery') || '[]');
let currentFilter = 'all';

// ======= ESTIMATES — READ ONLY =======
function renderEstimates() {
  updateStats();
  const list = document.getElementById('estimatesList');
  const filtered = currentFilter === 'all'
    ? estimates
    : estimates.filter(e => e.status === currentFilter);

  if (estimates.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="es-icon">📋</div>No estimates received yet.<br>They'll appear here when someone submits the form.</div>`;
    return;
  }
  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="es-icon">🔍</div>No estimates with this status.</div>`;
    return;
  }

  list.innerHTML = filtered.map((e, i) => {
    const realIdx = estimates.indexOf(e);
    const statusClass = e.status === 'New' ? 'new' : e.status === 'In Progress' ? 'in-progress' : e.status === 'Completed' ? 'completed' : 'cancelled';
    return `
    <div class="estimate-card-admin">
      <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:8px;">
        <div class="ec-name">${e.name || 'Unknown'}</div>
        <span class="ec-status ${statusClass}">${e.status}</span>
      </div>
      ${e.phone ? `<div class="ec-detail" style="margin-top:4px;">📞 ${e.phone}</div>` : ''}
      ${e.email ? `<div class="ec-detail">✉️ ${e.email}</div>` : ''}
      ${e.borough ? `<div class="ec-detail">📍 ${e.borough}${e.service ? ' · ' + e.service : ''}</div>` : e.service ? `<div class="ec-detail">🔨 ${e.service}</div>` : ''}
      ${e.description || e.notes ? `<div class="ec-detail" style="margin-top:6px; color:var(--text-mid); font-style:italic; line-height:1.4;">"${e.description || e.notes}"</div>` : ''}
      <div class="ec-detail" style="margin-top:6px; font-size:10px; opacity:0.4;">${new Date(e.date).toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric', hour:'2-digit', minute:'2-digit'})}</div>
      <div class="ec-actions">
        <button class="ec-btn primary" onclick="setStatus(${realIdx},'In Progress')">In Progress</button>
        <button class="ec-btn success" onclick="setStatus(${realIdx},'Completed')">Done</button>
        <button class="ec-btn danger"  onclick="deleteEstimate(${realIdx})">Delete</button>
      </div>
    </div>`;
  }).join('');
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderEstimates();
}

function setStatus(i, status) {
  estimates[i].status = status;
  localStorage.setItem('lxl_estimates', JSON.stringify(estimates));
  renderEstimates();
  showToast(`Marked: ${status}`, true);
}

function deleteEstimate(i) {
  if (!confirm('Delete this estimate request?')) return;
  estimates.splice(i, 1);
  localStorage.setItem('lxl_estimates', JSON.stringify(estimates));
  renderEstimates();
  showToast('Deleted.', false);
}

function updateStats() {
  document.getElementById('statTotal').textContent    = estimates.length;
  document.getElementById('statNew').textContent      = estimates.filter(e => e.status === 'New').length;
  document.getElementById('statProgress').textContent = estimates.filter(e => e.status === 'In Progress').length;
  document.getElementById('statDone').textContent     = estimates.filter(e => e.status === 'Completed').length;
}

// ======= GALLERY =======
function handleAdminUpload(event) {
  const files = Array.from(event.target.files);
  const category = document.getElementById('photoCategory').value;
  const isBefore = document.getElementById('isBeforePhoto').checked;
  let loaded = 0;
  const grid = document.getElementById('adminGalleryGrid');
  if (galleryPhotos.length === 0) grid.innerHTML = '';
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = function(e) {
      const photo = { src: e.target.result, category, isBefore, date: Date.now() };
      galleryPhotos.push(photo);
      addGalleryThumb(photo, galleryPhotos.length - 1);
      loaded++;
      if (loaded === files.length) showToast(`${loaded} photo(s) added!`, true);
    };
    reader.readAsDataURL(file);
  });
}

function addGalleryThumb(photo, idx) {
  const grid = document.getElementById('adminGalleryGrid');
  const div = document.createElement('div');
  div.className = 'gallery-thumb';
  div.style.backgroundImage = `url(${photo.src})`;
  div.style.backgroundSize = 'cover';
  div.style.backgroundPosition = 'center';
  div.innerHTML = `
    <div class="gt-label">${photo.isBefore ? 'BEFORE' : 'AFTER'} · ${photo.category}</div>
    <button class="gt-del" onclick="deleteGalleryPhoto(${idx})" title="Delete">✕</button>
  `;
  grid.appendChild(div);
}

function deleteGalleryPhoto(idx) {
  if (!confirm('Remove this photo?')) return;
  galleryPhotos.splice(idx, 1);
  renderGallery();
  showToast('Photo removed.', false);
}

function renderGallery() {
  const grid = document.getElementById('adminGalleryGrid');
  if (galleryPhotos.length === 0) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="es-icon">📷</div>No photos yet — upload above</div>';
    return;
  }
  grid.innerHTML = '';
  galleryPhotos.forEach((p, i) => addGalleryThumb(p, i));
}

// ======= TOAST =======
function showToast(message, success = true) {
  const toast = document.getElementById('toast');
  toast.innerText = message;
  toast.style.backgroundColor = success ? 'var(--neon)' : 'var(--hot)';
  toast.style.color = success ? '#000' : '#fff';
  toast.style.visibility = 'visible';
  toast.style.opacity = '1';
  toast.style.bottom = '40px';
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.bottom = '20px';
    setTimeout(() => { toast.style.visibility = 'hidden'; }, 400);
  }, 2800);
}

// ======= INIT =======
renderEstimates();
renderGallery();
</script>

</body>
</html>
