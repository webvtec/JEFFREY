<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LXL Home Improvement — Admin Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:         #0D0F14;
      --surface:    #13161D;
      --surface2:   #1A1E28;
      --surface3:   #212634;
      --neon:       #00C9A7;
      --neon-dim:   rgba(0,201,167,0.1);
      --hot:        #FF6B35;
      --hot-dim:    rgba(255,107,53,0.1);
      --text:       #E8EBF0;
      --text-dim:   #6B7485;
      --text-mid:   #9AA3B2;
      --border:     rgba(255,255,255,0.06);
      --border-lit: rgba(0,201,167,0.25);
      --green:      #22C55E;
      --red:        #EF4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      font-size: 14px;
    }

    /* ======= HEADER ======= */
    .header-bar {
      background: var(--surface);
      padding: 0 16px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 5px;
      color: #fff;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-bar::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--neon), var(--hot), var(--neon), transparent);
      background-size: 300% 100%;
      animation: stripeFlow 5s linear infinite;
    }
    @keyframes stripeFlow {
      0%   { background-position: 200% center; }
      100% { background-position: -100% center; }
    }
    .brand-teal { color: var(--neon); }
    .brand-admin { font-size: 9px; letter-spacing: 4px; font-weight: 500; opacity: 0.45; margin-left: 10px; }

    /* ======= TOP NAV ======= */
    .top-menu {
      display: flex;
      gap: 4px;
      background: var(--surface);
      padding: 8px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 52px;
      z-index: 90;
    }
    .top-menu button {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid transparent;
      padding: 7px 6px;
      border-radius: 5px;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: clamp(9px, 2.8vw, 11px);
      letter-spacing: 1px;
      text-transform: uppercase;
      flex: 1;
      transition: all 0.18s ease;
    }
    .top-menu button:hover { color: var(--text-mid); background: rgba(255,255,255,0.04); }
    .top-menu button.active { background: var(--neon-dim); color: var(--neon); border-color: var(--border-lit); }

    /* ======= CONTENT ======= */
    .page-section { display: none; padding: 14px; }
    .page-section.active { display: block; }

    /* ======= SECTION TITLE ======= */
    .section-title {
      font-weight: 700;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title::before {
      content: '';
      width: 3px; height: 14px;
      background: var(--neon);
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ======= ESTIMATE CARDS ======= */
    .estimate-card-admin {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 8px;
      transition: border-color 0.2s ease;
    }
    .estimate-card-admin:hover { border-color: rgba(0,201,167,0.2); }
    .ec-name { font-weight: 700; font-size: 14px; color: var(--text); margin-bottom: 4px; }
    .ec-detail { font-size: 12px; color: var(--text-dim); margin-bottom: 2px; }
    .ec-status {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: 8px;
    }
    .ec-status.new       { background: var(--neon-dim); color: var(--neon); border: 1px solid rgba(0,201,167,0.2); }
    .ec-status.in-progress { background: var(--hot-dim); color: var(--hot); border: 1px solid rgba(255,107,53,0.2); }
    .ec-status.completed { background: rgba(34,197,94,0.1); color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
    .ec-status.cancelled { background: rgba(239,68,68,0.1); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }

    .ec-actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
    .ec-btn {
      padding: 5px 12px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.15s ease;
    }
    .ec-btn.primary { background: rgba(0,201,167,0.15); color: var(--neon); border: 1px solid rgba(0,201,167,0.3); }
    .ec-btn.primary:hover { background: rgba(0,201,167,0.25); }
    .ec-btn.success { background: rgba(34,197,94,0.12); color: var(--green); border: 1px solid rgba(34,197,94,0.25); }
    .ec-btn.success:hover { background: rgba(34,197,94,0.22); }
    .ec-btn.danger  { background: rgba(239,68,68,0.12); color: var(--red); border: 1px solid rgba(239,68,68,0.25); }
    .ec-btn.danger:hover  { background: rgba(239,68,68,0.22); }

    /* ======= EMPTY STATE ======= */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-dim);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .empty-state .es-icon { font-size: 32px; margin-bottom: 10px; opacity: 0.3; }

    /* ======= FILTER BAR ======= */
    .filter-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .filter-btn:hover { border-color: var(--border-lit); color: var(--text-mid); }
    .filter-btn.active { background: var(--neon-dim); color: var(--neon); border-color: var(--border-lit); }

    /* ======= GALLERY ======= */
    .gallery-admin-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-top: 10px;
    }
    @media (min-width: 600px) { .gallery-admin-grid { grid-template-columns: repeat(3, 1fr); } }
    .gallery-thumb {
      position: relative;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid var(--border);
      aspect-ratio: 4/3;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .gallery-thumb:hover { border-color: var(--border-lit); }
    .gallery-thumb .gt-label {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.75);
      padding: 3px 7px;
      font-size: 8px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #fff;
    }
    .gallery-thumb .gt-del {
      position: absolute;
      top: 4px; right: 4px;
      background: rgba(239,68,68,0.85);
      color: #fff;
      border: none;
      border-radius: 4px;
      width: 20px; height: 20px;
      font-size: 11px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .gallery-thumb:hover .gt-del { display: flex; }

    .upload-zone-admin {
      border: 1px dashed rgba(0,201,167,0.25);
      border-radius: 7px;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      background: rgba(0,201,167,0.02);
      margin-bottom: 14px;
    }
    .upload-zone-admin:hover { border-color: rgba(0,201,167,0.5); background: rgba(0,201,167,0.06); }
    .upload-zone-admin p { font-size: 10px; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; margin-top: 5px; }
    #adminPhotoInput { display: none; }

    .form-group { margin-bottom: 12px; }
    .form-label { display: block; font-weight: 600; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 5px; }
    .form-select {
      width: 100%;
      padding: 9px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      outline: none;
    }
    .form-select option { background: var(--surface2); }
    .form-select:focus { border-color: var(--neon); }

    /* ======= TOAST ======= */
    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--neon);
      color: #000;
      padding: 9px 20px;
      border-radius: 6px;
      font-weight: 700;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      z-index: 9999;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.3s, bottom 0.3s;
      white-space: nowrap;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }
  </style>

  <!-- Firebase Storage (compat SDK) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <script>
    (function() {
      var app = firebase.initializeApp({
        apiKey:            "AIzaSyDZsl7wCM4ABai7-YMg_6PzPUOsq2M9CKM",
        authDomain:        "lxl-home-improvement-llc.firebaseapp.com",
        projectId:         "lxl-home-improvement-llc",
        storageBucket:     "lxl-home-improvement-llc.firebasestorage.app",
        messagingSenderId: "690054839471",
        appId:             "1:690054839471:web:59a803e363766c75e6e85a"
      });
      var storage = firebase.storage(app);

      /* UPLOAD */
      window.fbUpload = function(files, category) {
        var grid = document.getElementById("adminGalleryGrid");
        var empty = grid.querySelector(".empty-state");
        if (empty) empty.remove();
        var total = files.length;
        var done = 0;

        Array.from(files).forEach(function(file) {
          var safe = file.name.replace(/[^a-zA-Z0-9._-]/g, "_");
          var path = "gallery/" + Date.now() + "_" + safe;
          var sRef = storage.ref(path);
          var pid = "ph_" + Math.random().toString(36).slice(2);

          var ph = document.createElement("div");
          ph.className = "gallery-thumb";
          ph.id = pid;
          var wrap = document.createElement("div");
          wrap.style.cssText = "position:absolute;inset:0;background:var(--surface2);display:flex;align-items:flex-end";
          var bar = document.createElement("div");
          bar.id = "bar_" + pid;
          bar.style.cssText = "height:3px;width:0%;background:var(--neon);transition:width .15s";
          wrap.appendChild(bar);
          var lbl = document.createElement("div");
          lbl.className = "gt-label";
          lbl.textContent = category;
          ph.appendChild(wrap);
          ph.appendChild(lbl);
          grid.appendChild(ph);

          var task = sRef.put(file, { customMetadata: { category: category } });

          task.on("state_changed",
            function(snap) {
              var b = document.getElementById("bar_" + pid);
              if (b) b.style.width = Math.round(snap.bytesTransferred / snap.totalBytes * 100) + "%";
            },
            function(err) {
              console.error(err);
              var el = document.getElementById(pid);
              if (el) el.remove();
            },
            function() {
              task.snapshot.ref.getDownloadURL().then(function(url) {
                var el = document.getElementById(pid);
                if (el) {
                  el.style.backgroundImage = "url(" + url + ")";
                  el.style.backgroundSize = "cover";
                  el.style.backgroundPosition = "center";
                  el.innerHTML = "";
                  var l = document.createElement("div");
                  l.className = "gt-label";
                  l.textContent = category;
                  var btn = document.createElement("button");
                  btn.className = "gt-del";
                  btn.textContent = "✕";
                  btn.setAttribute("data-path", path);
                  btn.onclick = function() { window.fbDelete(path, btn); };
                  el.appendChild(l);
                  el.appendChild(btn);
                }
                done++;
                window.showToast("Uploaded " + done + " / " + total, true);
                if (done === total) window.showToast(total + " photo" + (total > 1 ? "s" : "") + " saved!", true);
              });
            }
          );
        });
      };

      /* DELETE */
      window.fbDelete = function(path, btn) {
        if (!confirm("Remove this photo?")) return;
        storage.ref(path).delete().then(function() {
          btn.closest(".gallery-thumb").remove();
          window.showToast("Photo deleted.", false);
          var grid = document.getElementById("adminGalleryGrid");
          if (!grid.querySelector(".gallery-thumb"))
            grid.innerHTML = "<div class='empty-state' style='grid-column:1/-1'>No photos yet</div>";
        }).catch(function(e) {
          console.error(e);
          window.showToast("Delete failed.", false);
        });
      };

      /* LOAD */
      window.fbLoadGallery = function() {
        var grid = document.getElementById("adminGalleryGrid");
        grid.innerHTML = "<div style='grid-column:1/-1;text-align:center;padding:40px;color:var(--text-dim);font-size:24px;animation:spin 1s linear infinite'>↻</div>";
        storage.ref("gallery/").listAll().then(function(result) {
          grid.innerHTML = "";
          if (!result.items.length) {
            grid.innerHTML = "<div class='empty-state' style='grid-column:1/-1'>No photos yet — upload above</div>";
            return;
          }
          var promises = result.items.map(function(item) {
            return Promise.all([item.getDownloadURL(), item.getMetadata()]).then(function(vals) {
              return { url: vals[0], path: item.fullPath, category: (vals[1].customMetadata && vals[1].customMetadata.category) || "General" };
            });
          });
          Promise.all(promises).then(function(photos) {
            photos.forEach(function(photo) {
              var div = document.createElement("div");
              div.className = "gallery-thumb";
              div.style.backgroundImage = "url(" + photo.url + ")";
              div.style.backgroundSize = "cover";
              div.style.backgroundPosition = "center";
              var lbl = document.createElement("div");
              lbl.className = "gt-label";
              lbl.textContent = photo.category;
              var btn = document.createElement("button");
              btn.className = "gt-del";
              btn.textContent = "✕";
              btn.onclick = (function(p, b) { return function() { window.fbDelete(p, b); }; })(photo.path, btn);
              div.appendChild(lbl);
              div.appendChild(btn);
              grid.appendChild(div);
            });
          });
        }).catch(function(e) {
          console.error(e);
          grid.innerHTML = "<div style='grid-column:1/-1;text-align:center;padding:40px;color:var(--red)'>⚠️ Failed to load. Check Firebase Storage rules.</div>";
        });
      };

      // Don't auto-load on DOMContentLoaded — only load when gallery tab is shown
    })();
  </script>
</head>
<body>

<!-- ===== CHECKING ACCESS OVERLAY ===== -->

<!-- ======= FIREBASE MODULE SCRIPT ======= -->
<script type="module">
import { initializeApp }        from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, query, orderBy, where }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey:            "AIzaSyDZsl7wCM4ABai7-YMg_6PzPUOsq2M9CKM",
  authDomain:        "lxl-home-improvement-llc.firebaseapp.com",
  projectId:         "lxl-home-improvement-llc",
  storageBucket:     "lxl-home-improvement-llc.firebasestorage.app",
  messagingSenderId: "690054839471",
  appId:             "1:690054839471:web:59a803e363766c75e6e85a"
};

const app = initializeApp(firebaseConfig);
const db   = getFirestore(app);
const auth = getAuth(app);

// ── AUTH GUARD ──────────────────────────────────────────────────────────────
const ADMIN_UID = 'ruPIdPfSUGc81QlcDIAqlRPBMjZ2';

onAuthStateChanged(auth, user => {
  const overlay = document.getElementById('accessOverlay');
  const status  = document.getElementById('accessStatus');
  const content = document.getElementById('dashboardContent');

  if (!user) {
    status.textContent = 'Access denied — redirecting...';
    status.style.color = 'var(--hot)';
    setTimeout(() => { window.location.href = 'index.html'; }, 1200);
    return;
  }

  if (user.uid !== ADMIN_UID) {
    status.textContent = 'Unauthorised — signing out...';
    status.style.color = 'var(--hot)';
    signOut(auth).then(() => {
      setTimeout(() => { window.location.href = 'index.html'; }, 1200);
    });
    return;
  }

  // Verified admin — reveal dashboard
  document.getElementById('adminUserEmail').textContent = user.email;
  status.textContent = 'Access granted';
  status.style.color = 'var(--green)';
  setTimeout(() => {
    overlay.style.transition = 'opacity 0.4s';
    overlay.style.opacity = '0';
    setTimeout(() => {
      overlay.style.display = 'none';
      content.style.display = 'block';
    }, 400);
  }, 700);

});

window.handleSignOut = async function() {
  await signOut(auth);
  window.location.href = 'index.html';
};

// ── TAB SWITCHER ────────────────────────────────────────────────────────────
let galleryLoaded = false;
window.showTab = function(tab) {
  document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.top-menu button').forEach(b => b.classList.remove('active'));
  document.getElementById('sec-' + tab).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'gallery' && !galleryLoaded) {
    galleryLoaded = true;
    window.fbLoadGallery();
  }
};

// ── TOAST ───────────────────────────────────────────────────────────────────
window.showToast = function(msg, success) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = success ? 'var(--neon)' : 'var(--hot)';
  t.style.color = success ? '#000' : '#fff';
  t.style.visibility = 'visible';
  t.style.opacity = '1';
  t.style.bottom = '40px';
  setTimeout(() => {
    t.style.opacity = '0';
    t.style.bottom = '20px';
    setTimeout(() => { t.style.visibility = 'hidden'; }, 400);
  }, 2800);
};

// ── GALLERY UPLOAD ───────────────────────────────────────────────────────────
window.handleUpload = function(files) {
  const category = document.getElementById('uploadCategory').value;
  window.fbUpload(files, category);
};
</script>

</div><!-- end #dashboardContent -->
</body>
