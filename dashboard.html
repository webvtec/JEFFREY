<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LXL Home Improvement — Admin Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:         #0D0F14;
      --surface:    #13161D;
      --surface2:   #1A1E28;
      --surface3:   #212634;
      --neon:       #00C9A7;
      --neon-dim:   rgba(0,201,167,0.1);
      --hot:        #FF6B35;
      --hot-dim:    rgba(255,107,53,0.1);
      --text:       #E8EBF0;
      --text-dim:   #6B7485;
      --text-mid:   #9AA3B2;
      --border:     rgba(255,255,255,0.06);
      --border-lit: rgba(0,201,167,0.25);
      --green:      #22C55E;
      --red:        #EF4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      font-size: 14px;
    }

    /* ======= HEADER ======= */
    .header-bar {
      background: var(--surface);
      padding: 0 16px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 5px;
      color: #fff;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-bar::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--neon), var(--hot), var(--neon), transparent);
      background-size: 300% 100%;
      animation: stripeFlow 5s linear infinite;
    }
    @keyframes stripeFlow {
      0%   { background-position: 200% center; }
      100% { background-position: -100% center; }
    }
    .brand-teal { color: var(--neon); }
    .brand-admin { font-size: 9px; letter-spacing: 4px; font-weight: 500; opacity: 0.45; margin-left: 10px; }

    /* ======= CONTENT ======= */
    .page-section { display: none; padding: 14px; }
    .page-section.active { display: block; }

    /* ======= SECTION TITLE ======= */
    .section-title {
      font-weight: 700;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title::before {
      content: '';
      width: 3px; height: 14px;
      background: var(--neon);
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ======= ESTIMATE CARDS ======= */
    .estimate-card-admin {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 8px;
      transition: border-color 0.2s ease;
    }
    .estimate-card-admin:hover { border-color: rgba(0,201,167,0.2); }
    .ec-name { font-weight: 700; font-size: 14px; color: var(--text); margin-bottom: 4px; }
    .ec-detail { font-size: 12px; color: var(--text-dim); margin-bottom: 2px; }
    .ec-status {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: 8px;
    }
    .ec-status.new       { background: var(--neon-dim); color: var(--neon); border: 1px solid rgba(0,201,167,0.2); }
    .ec-status.in-progress { background: var(--hot-dim); color: var(--hot); border: 1px solid rgba(255,107,53,0.2); }
    .ec-status.completed { background: rgba(34,197,94,0.1); color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
    .ec-status.cancelled { background: rgba(239,68,68,0.1); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }

    .ec-actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
    .ec-btn {
      padding: 5px 12px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.15s ease;
    }
    .ec-btn.primary { background: rgba(0,201,167,0.15); color: var(--neon); border: 1px solid rgba(0,201,167,0.3); }
    .ec-btn.primary:hover { background: rgba(0,201,167,0.25); }
    .ec-btn.success { background: rgba(34,197,94,0.12); color: var(--green); border: 1px solid rgba(34,197,94,0.25); }
    .ec-btn.success:hover { background: rgba(34,197,94,0.22); }
    .ec-btn.danger  { background: rgba(239,68,68,0.12); color: var(--red); border: 1px solid rgba(239,68,68,0.25); }
    .ec-btn.danger:hover  { background: rgba(239,68,68,0.22); }

    /* ======= EMPTY STATE ======= */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-dim);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .empty-state .es-icon { font-size: 32px; margin-bottom: 10px; opacity: 0.3; }

    /* ======= FILTER BAR ======= */
    .filter-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .filter-btn:hover { border-color: var(--border-lit); color: var(--text-mid); }
    .filter-btn.active { background: var(--neon-dim); color: var(--neon); border-color: var(--border-lit); }

    /* ======= GALLERY ======= */
    .gallery-admin-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-top: 10px;
    }
    @media (min-width: 600px) { .gallery-admin-grid { grid-template-columns: repeat(3, 1fr); } }
    .gallery-thumb {
      position: relative;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid var(--border);
      aspect-ratio: 4/3;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .gallery-thumb:hover { border-color: var(--border-lit); }
    .gallery-thumb .gt-label {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.75);
      padding: 3px 7px;
      font-size: 8px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #fff;
    }
    .gallery-thumb .gt-del {
      position: absolute;
      top: 4px; right: 4px;
      background: rgba(239,68,68,0.85);
      color: #fff;
      border: none;
      border-radius: 4px;
      width: 20px; height: 20px;
      font-size: 11px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .gallery-thumb:hover .gt-del { display: flex; }

    .upload-zone-admin {
      border: 1px dashed rgba(0,201,167,0.25);
      border-radius: 7px;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      background: rgba(0,201,167,0.02);
      margin-bottom: 14px;
    }
    .upload-zone-admin:hover { border-color: rgba(0,201,167,0.5); background: rgba(0,201,167,0.06); }
    .upload-zone-admin p { font-size: 10px; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; margin-top: 5px; }
    #adminPhotoInput { display: none; }

    .form-group { margin-bottom: 12px; }
    .form-label { display: block; font-weight: 600; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 5px; }
    .form-select {
      width: 100%;
      padding: 9px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      outline: none;
    }
    .form-select option { background: var(--surface2); }
    .form-select:focus { border-color: var(--neon); }

    /* ======= TOAST ======= */
    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--neon);
      color: #000;
      padding: 9px 20px;
      border-radius: 6px;
      font-weight: 700;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      z-index: 9999;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.3s, bottom 0.3s;
      white-space: nowrap;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }
  </style>

</head>
<body>

<!-- ===== CHECKING ACCESS OVERLAY ===== -->
<div id="accessOverlay" style="position:fixed;inset:0;z-index:99999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;">
  <div style="font-family:'Outfit',sans-serif;font-weight:800;font-size:18px;letter-spacing:6px;text-transform:uppercase;color:var(--neon);">Checking Access</div>
  <div style="display:flex;gap:10px;">
    <span style="width:10px;height:10px;border-radius:50%;background:var(--neon);animation:dotpulse 1.2s ease-in-out infinite;display:inline-block;"></span>
    <span style="width:10px;height:10px;border-radius:50%;background:var(--neon);animation:dotpulse 1.2s ease-in-out 0.4s infinite;display:inline-block;"></span>
    <span style="width:10px;height:10px;border-radius:50%;background:var(--neon);animation:dotpulse 1.2s ease-in-out 0.8s infinite;display:inline-block;"></span>
  </div>
  <div id="accessStatus" style="font-family:'Outfit',sans-serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--text-dim);">Verifying identity...</div>
</div>
<style>
  @keyframes dotpulse{0%,100%{opacity:0.2;transform:scale(0.8);}50%{opacity:1;transform:scale(1.2);}}
  #dashboardContent{display:none;}
  .nav-btn {
    flex:1;padding:10px 6px;border-radius:6px;cursor:pointer;
    font-family:'Outfit',sans-serif;font-weight:700;font-size:10px;
    letter-spacing:2px;text-transform:uppercase;transition:all 0.18s;
    border:1px solid var(--border);background:transparent;color:var(--text-dim);
  }
  .nav-btn.active { background:var(--neon-dim);border-color:var(--border-lit);color:var(--neon); }
</style>

<div id="dashboardContent">

  <!-- HEADER -->
  <div class="header-bar" style="position:relative;">
    <span class="brand-teal">LXL</span>&nbsp;ADMIN
    <button onclick="handleSignOut()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:transparent;border:1px solid var(--border);color:var(--text-dim);border-radius:5px;padding:4px 12px;font-family:'Outfit',sans-serif;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;">Sign Out</button>
  </div>

  <!-- NAV -->
  <div style="display:flex;gap:8px;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:52px;z-index:90;">
    <button class="nav-btn active" id="btn-gallery" onclick="showSection('gallery')">🖼️ Gallery</button>
    <button class="nav-btn" id="btn-estimates" onclick="showSection('estimates')">📋 Estimates</button>
  </div>

  <!-- GALLERY SECTION -->
  <div class="page-section active" id="sec-gallery">
    <div class="upload-zone-admin" onclick="document.getElementById('adminPhotoInput').click()">
      <div style="font-size:28px;">📷</div>
      <p>Tap to upload photos</p>
    </div>
    <input type="file" id="adminPhotoInput" accept="image/*" multiple onchange="handleUpload(this.files)">
    <div class="form-group">
      <label class="form-label">Category</label>
      <select class="form-select" id="uploadCategory">
        <option>Kitchen Refurbishment</option>
        <option>Bathroom Refurbishment</option>
        <option>Flooring &amp; Tiling</option>
        <option>Painting &amp; Carpentry</option>
        <option>Masonry</option>
        <option>Window Replacement</option>
        <option>General</option>
      </select>
    </div>
    <div class="gallery-admin-grid" id="adminGalleryGrid">
      <div class="empty-state" style="grid-column:1/-1"><div class="es-icon">🖼️</div>Loading gallery...</div>
    </div>
  </div>

  <!-- ESTIMATES SECTION -->
  <div class="page-section" id="sec-estimates">
    <div class="section-title">📋 Estimate Requests</div>
    <div id="estimatesList"><div class="empty-state"><div class="es-icon">📋</div>Loading...</div></div>
  </div>

</div><!-- end #dashboardContent -->

<div id="toast"></div>


<!-- ======= FIREBASE MODULE SCRIPT ======= -->
<script type="module">
import { initializeApp }        from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, addDoc, updateDoc, deleteDoc, setDoc, query, orderBy, where, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getStorage, ref, uploadBytesResumable, getDownloadURL, deleteObject, listAll, getMetadata }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey:            "AIzaSyDZsl7wCM4ABai7-YMg_6PzPUOsq2M9CKM",
  authDomain:        "lxl-home-improvement-llc.firebaseapp.com",
  projectId:         "lxl-home-improvement-llc",
  storageBucket:     "lxl-home-improvement-llc.firebasestorage.app",
  messagingSenderId: "690054839471",
  appId:             "1:690054839471:web:59a803e363766c75e6e85a"
};

const app     = initializeApp(firebaseConfig);
const db      = getFirestore(app);
const auth    = getAuth(app);
const storage = getStorage(app);

// ── AUTH GUARD ──────────────────────────────────────────────────────────────
const ADMIN_UID = 'ruPIdPfSUGc81QlcDIAqlRPBMjZ2';

onAuthStateChanged(auth, user => {
  const overlay = document.getElementById('accessOverlay');
  const status  = document.getElementById('accessStatus');
  const content = document.getElementById('dashboardContent');

  if (!user) {
    status.textContent = 'Access denied — redirecting...';
    status.style.color = 'var(--hot)';
    setTimeout(() => { window.location.href = 'index.html'; }, 1200);
    return;
  }

  if (user.uid !== ADMIN_UID) {
    status.textContent = 'Unauthorised — signing out...';
    status.style.color = 'var(--hot)';
    signOut(auth).then(() => {
      setTimeout(() => { window.location.href = 'index.html'; }, 1200);
    });
    return;
  }

  // Verified admin — reveal dashboard
  status.textContent = 'Access granted';
  status.style.color = 'var(--green)';
  setTimeout(() => {
    overlay.style.transition = 'opacity 0.4s';
    overlay.style.opacity = '0';
    setTimeout(() => {
      overlay.style.display = 'none';
      content.style.display = 'block';
      window.fbLoadGallery();
      loadEstimates();
    }, 400);
  }, 700);

});

window.handleSignOut = async function() {
  await signOut(auth);
  window.location.href = 'index.html';
};


// ── SECTION SWITCHER ─────────────────────────────────────────────────────────
window.showSection = function(name) {
  document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sec-' + name).classList.add('active');
  document.getElementById('btn-' + name).classList.add('active');
  if (name === 'estimates') loadEstimates();
};


// ── ESTIMATES ────────────────────────────────────────────────────────────────
async function loadEstimates() {
  const el = document.getElementById('estimatesList');
  el.innerHTML = '<div class="empty-state"><div class="es-icon">⏳</div>Loading...</div>';
  try {
    const snap = await getDocs(query(collection(db, 'estimates'), orderBy('submittedAt', 'desc')));
    if (snap.empty) {
      el.innerHTML = '<div class="empty-state"><div class="es-icon">📋</div>No estimates yet.</div>';
      return;
    }

    const pending  = [];
    const accepted = [];
    const cancelled = [];

    snap.docs.forEach(d => {
      const e = { id: d.id, ...d.data() };
      if (e.status === 'accepted') accepted.push(e);
      else if (e.status === 'cancelled') cancelled.push(e);
      else pending.push(e);
    });

    function renderCard(e) {
      const date = e.submittedAt
        ? new Date(e.submittedAt.seconds * 1000).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' })
        : '—';
      const isPending   = !e.status || e.status === 'pending';
      const isAccepted  = e.status === 'accepted';
      const isCancelled = e.status === 'cancelled';
      return `
        <div class="estimate-card-admin" id="est-${e.id}" style="${isCancelled ? 'opacity:0.5;' : ''}">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;">
            <div class="ec-name">${e.name || '—'}</div>
            <span class="ec-status ${isAccepted ? 'completed' : isCancelled ? 'cancelled' : 'new'}">
              ${isAccepted ? 'Accepted' : isCancelled ? 'Cancelled' : 'Pending'}
            </span>
          </div>
          <div class="ec-detail">📞 ${e.phone || '—'}</div>
          ${e.email    ? `<div class="ec-detail">📧 ${e.email}</div>` : ''}
          ${e.borough  ? `<div class="ec-detail">📍 ${e.borough}${e.address ? ' · ' + e.address : ''}</div>` : ''}
          <div class="ec-detail">🛠 ${e.service || '—'}</div>
          ${e.description ? `<div class="ec-detail" style="margin-top:6px;color:var(--text-mid);">${e.description}</div>` : ''}
          <div class="ec-detail" style="margin-top:8px;font-size:10px;color:var(--text-dim);letter-spacing:1px;">${date}</div>
          ${!isCancelled ? `
          <div class="ec-actions">
            ${isPending ? `<button class="ec-btn success" onclick="updateEstimate('${e.id}','accepted')">✓ Accept</button>` : ''}
            ${isAccepted ? `<button class="ec-btn primary" onclick="updateEstimate('${e.id}','pending')">↩ Revert</button>` : ''}
            <button class="ec-btn danger" onclick="updateEstimate('${e.id}','cancelled')">✕ Cancel</button>
          </div>` : `
          <div class="ec-actions">
            <button class="ec-btn danger" onclick="deleteEstimate('${e.id}')">🗑 Delete</button>
          </div>`}
        </div>`;
    }

    let out = '';

    if (pending.length) {
      out += `<div style="font-family:'Outfit',sans-serif;font-weight:800;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--amber,#F5A623);padding:12px 0 8px;border-top:1px solid var(--border);margin-top:4px;">⏳ Pending (${pending.length})</div>`;
      out += pending.map(renderCard).join('');
    }

    if (accepted.length) {
      out += `<div style="font-family:'Outfit',sans-serif;font-weight:800;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--green);padding:12px 0 8px;border-top:1px solid var(--border);margin-top:4px;">✅ Accepted (${accepted.length})</div>`;
      out += accepted.map(renderCard).join('');
    }

    if (cancelled.length) {
      out += `<div style="font-family:'Outfit',sans-serif;font-weight:800;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--red);padding:12px 0 8px;border-top:1px solid var(--border);margin-top:4px;">✕ Cancelled (${cancelled.length})</div>`;
      out += cancelled.map(renderCard).join('');
    }

    el.innerHTML = out;

  } catch(err) {
    console.error(err);
    el.innerHTML = '<div class="empty-state"><div class="es-icon">⚠️</div>Failed to load estimates.</div>';
  }
}

window.updateEstimate = async function(id, status) {
  try {
    await updateDoc(doc(db, 'estimates', id), { status });
    loadEstimates();
    showToast(status === 'accepted' ? 'Estimate accepted!' : status === 'cancelled' ? 'Estimate cancelled.' : 'Reverted to pending.', status !== 'cancelled');
  } catch(e) {
    console.error(e);
    showToast('Failed to update.', false);
  }
};

window.deleteEstimate = async function(id) {
  if (!confirm('Delete this estimate permanently?')) return;
  try {
    await deleteDoc(doc(db, 'estimates', id));
    loadEstimates();
    showToast('Estimate deleted.', false);
  } catch(e) {
    showToast('Failed to delete.', false);
  }
};

// ── TOAST ───────────────────────────────────────────────────────────────────
window.showToast = function(msg, success) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = success ? 'var(--neon)' : 'var(--hot)';
  t.style.color = success ? '#000' : '#fff';
  t.style.visibility = 'visible';
  t.style.opacity = '1';
  t.style.bottom = '40px';
  setTimeout(() => {
    t.style.opacity = '0';
    t.style.bottom = '20px';
    setTimeout(() => { t.style.visibility = 'hidden'; }, 400);
  }, 2800);
};

// ── GALLERY UPLOAD ────────────────────────────────────────────────────────────
window.handleUpload = function(files) {
  const category = document.getElementById('uploadCategory').value;
  window.fbUpload(files, category);
};

window.fbUpload = function(files, category) {
  const grid = document.getElementById('adminGalleryGrid');
  const empty = grid.querySelector('.empty-state');
  if (empty) empty.remove();
  let total = files.length, done = 0;

  Array.from(files).forEach(file => {
    const safe = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
    const ts   = Date.now();
    const path = 'gallery/' + ts + '_' + safe;
    const storageRef = ref(storage, path);
    const pid = 'ph_' + Math.random().toString(36).slice(2);

    const ph = document.createElement('div');
    ph.className = 'gallery-thumb';
    ph.id = pid;
    const wrap = document.createElement('div');
    wrap.style.cssText = 'position:absolute;inset:0;background:var(--surface2);display:flex;align-items:flex-end';
    const bar = document.createElement('div');
    bar.id = 'bar_' + pid;
    bar.style.cssText = 'height:3px;width:0%;background:var(--neon);transition:width .15s';
    wrap.appendChild(bar);
    const lbl = document.createElement('div');
    lbl.className = 'gt-label';
    lbl.textContent = category;
    ph.appendChild(wrap);
    ph.appendChild(lbl);
    grid.appendChild(ph);

    const task = uploadBytesResumable(storageRef, file, { customMetadata: { category } });

    task.on('state_changed',
      snap => {
        const b = document.getElementById('bar_' + pid);
        if (b) b.style.width = Math.round(snap.bytesTransferred / snap.totalBytes * 100) + '%';
      },
      err => {
        console.error(err);
        const el = document.getElementById(pid);
        if (el) el.remove();
        showToast('Upload failed: ' + err.message, false);
      },
      () => {
        getDownloadURL(task.snapshot.ref).then(async url => {
          // Save to Firestore so index.html can read sort order
          await addDoc(collection(db, 'galleryMeta'), {
            path, url, category, sortOrder: ts,
            uploadedAt: serverTimestamp()
          });
          done++;
          if (done === total) { showToast(total + ' photo' + (total > 1 ? 's' : '') + ' saved!', true); window.fbLoadGallery(); }
          else showToast('Uploaded ' + done + ' / ' + total, true);
        });
      }
    );
  });
};

window.fbDelete = async function(path, docId, btn) {
  if (!confirm('Remove this photo?')) return;
  try {
    await deleteObject(ref(storage, path));
    if (docId) await deleteDoc(doc(db, 'galleryMeta', docId));
    btn.closest('.gallery-thumb').remove();
    showToast('Photo deleted.', false);
    const grid = document.getElementById('adminGalleryGrid');
    if (!grid.querySelector('.gallery-thumb'))
      grid.innerHTML = "<div class='empty-state' style='grid-column:1/-1'>No photos yet</div>";
  } catch(e) {
    console.error(e);
    showToast('Delete failed.', false);
  }
};

window.fbLoadGallery = async function() {
  const container = document.getElementById('adminGalleryGrid');
  container.innerHTML = "<div style='grid-column:1/-1;text-align:center;padding:40px;color:var(--text-dim);font-size:24px;animation:spin 1s linear infinite'>↻</div>";

  try {
    const snap = await getDocs(query(collection(db, 'galleryMeta'), orderBy('sortOrder', 'asc')));

    if (snap.empty) {
      container.innerHTML = "<div class='empty-state' style='grid-column:1/-1'>No photos yet — upload above</div>";
      return;
    }

    const photos = snap.docs.map(d => ({ docId: d.id, ...d.data() }));

    // Group by category preserving order
    const groups = {};
    const catOrder = [];
    photos.forEach(p => {
      if (!groups[p.category]) { groups[p.category] = []; catOrder.push(p.category); }
      groups[p.category].push(p);
    });

    container.innerHTML = '';

    catOrder.forEach(cat => {
      // Category heading
      const heading = document.createElement('div');
      heading.style.cssText = 'grid-column:1/-1;font-family:Outfit,sans-serif;font-weight:800;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--neon);padding:14px 0 8px;border-top:1px solid var(--border);margin-top:8px;';
      heading.textContent = cat;
      container.appendChild(heading);

      groups[cat].forEach(photo => {
        const div = document.createElement('div');
        div.className = 'gallery-thumb';
        div.draggable = true;
        div.dataset.docId  = photo.docId;
        div.dataset.path   = photo.path;
        div.dataset.cat    = photo.category;
        div.dataset.order  = photo.sortOrder;
        div.style.backgroundImage = 'url(' + photo.url + ')';
        div.style.backgroundSize = 'cover';
        div.style.backgroundPosition = 'center';
        div.style.cursor = 'grab';

        const btn = document.createElement('button');
        btn.className = 'gt-del';
        btn.textContent = '✕';
        btn.onclick = (e) => { e.stopPropagation(); window.fbDelete(photo.path, photo.docId, btn); };
        div.appendChild(btn);

        // Drag hint
        const hint = document.createElement('div');
        hint.style.cssText = 'position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.65);padding:3px 7px;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.5);';
        hint.textContent = '⠿ drag to reorder';
        div.appendChild(hint);

        container.appendChild(div);
      });
    });

    initDragReorder(container);

  } catch(e) {
    console.error(e);
    container.innerHTML = "<div style='grid-column:1/-1;text-align:center;padding:40px;color:var(--red)'>⚠️ Failed to load. Check Firebase rules.</div>";
  }
};

function initDragReorder(container) {
  let dragSrc = null;

  container.addEventListener('dragstart', e => {
    dragSrc = e.target.closest('.gallery-thumb');
    if (!dragSrc) return;
    dragSrc.style.opacity = '0.4';
    e.dataTransfer.effectAllowed = 'move';
  });

  container.addEventListener('dragover', e => {
    e.preventDefault();
    const target = e.target.closest('.gallery-thumb');
    if (target && target !== dragSrc) {
      const rect = target.getBoundingClientRect();
      const after = e.clientX > rect.left + rect.width / 2;
      container.insertBefore(dragSrc, after ? target.nextSibling : target);
    }
  });

  container.addEventListener('dragend', async () => {
    if (dragSrc) dragSrc.style.opacity = '';
    dragSrc = null;
    await saveOrder(container);
  });

  // Touch drag
  let touchEl = null, touchClone = null, offX = 0, offY = 0, pressTimer = null;

  container.addEventListener('touchstart', e => {
    const cell = e.target.closest('.gallery-thumb');
    if (!cell) return;
    pressTimer = setTimeout(() => {
      touchEl = cell;
      const r = cell.getBoundingClientRect();
      offX = e.touches[0].clientX - r.left;
      offY = e.touches[0].clientY - r.top;
      touchClone = cell.cloneNode(true);
      touchClone.style.cssText = `position:fixed;top:${r.top}px;left:${r.left}px;width:${r.width}px;opacity:0.75;z-index:9999;pointer-events:none;border-radius:6px;`;
      document.body.appendChild(touchClone);
      cell.style.opacity = '0.3';
      navigator.vibrate && navigator.vibrate(40);
    }, 400);
  }, { passive: true });

  container.addEventListener('touchmove', e => {
    if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
    if (!touchEl) return;
    e.preventDefault();
    const t = e.touches[0];
    touchClone.style.top  = (t.clientY - offY) + 'px';
    touchClone.style.left = (t.clientX - offX) + 'px';
    touchClone.style.display = 'none';
    const el = document.elementFromPoint(t.clientX, t.clientY);
    touchClone.style.display = '';
    const target = el && el.closest('.gallery-thumb');
    if (target && target !== touchEl) {
      const r = target.getBoundingClientRect();
      container.insertBefore(touchEl, t.clientX > r.left + r.width / 2 ? target.nextSibling : target);
    }
  }, { passive: false });

  const endTouch = async () => {
    if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
    if (!touchEl) return;
    touchEl.style.opacity = '';
    touchClone && touchClone.remove();
    touchClone = null;
    await saveOrder(container);
    touchEl = null;
  };
  container.addEventListener('touchend',   endTouch, { passive: true });
  container.addEventListener('touchcancel', endTouch, { passive: true });
}

async function saveOrder(container) {
  const thumbs = Array.from(container.querySelectorAll('.gallery-thumb'));
  const batch = thumbs.map((el, i) => {
    const docId = el.dataset.docId;
    if (!docId) return Promise.resolve();
    return updateDoc(doc(db, 'galleryMeta', docId), { sortOrder: i });
  });
  try {
    await Promise.all(batch);
    showToast('Order saved!', true);
  } catch(e) {
    showToast('Failed to save order.', false);
  }
}

</script>
